<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Responsive Telegram Web App</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <h1 id="greeting">Salom, Mehmon!</h1>
    <p>Qurilmani burab yoki ekranni o'zgartirib ko'ring.</p>
</header>

<main class="container">
    <div class="card">
        <h3>1-Qism</h3>
        <p>Mobil telefonda ustma-ust, kompyuterda esa yonma-yon joylashadi.</p>
    </div>
    <div class="card">
        <h3>2-Qism</h3>
        <p>Telegramning maxsus ranglari (mavzusi) ga avtomatik moslashadi.</p>
    </div>
    <div class="card">
        <h3>3-Qism</h3>
        <p>Telegram Web App to'liq ekran (expand) rejimida ochiladi.</p>
    </div>
</main>

<script src="app.js"></script>
</body>
</html>
